<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博客文章编辑器 - 所见即所得</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
        }

        .editor-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            min-height: calc(100vh - 200px);
        }

        .editor-panel, .preview-panel {
            padding: 30px;
            overflow-y: auto;
        }

        .editor-panel {
            border-right: 2px solid #e0e0e0;
            background: #f8f9fa;
        }

        .preview-panel {
            background: white;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .markdown-editor {
            margin-top: 20px;
        }

        .EasyMDEContainer {
            border-radius: 8px;
            overflow: hidden;
        }

        .preview-content {
            padding: 20px;
            background: white;
            border-radius: 8px;
            min-height: 400px;
        }

        .preview-header {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }

        .preview-category {
            display: inline-block;
            padding: 6px 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 20px;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .preview-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: #2d3436;
            margin-bottom: 15px;
            line-height: 1.2;
        }

        .preview-meta {
            display: flex;
            gap: 20px;
            color: #636e72;
            font-size: 14px;
        }

        .preview-body {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #2d3436;
        }

        .preview-body h2 {
            font-size: 1.8rem;
            margin-top: 2rem;
            margin-bottom: 1rem;
            color: #2d3436;
        }

        .preview-body h3 {
            font-size: 1.4rem;
            margin-top: 1.5rem;
            margin-bottom: 0.8rem;
            color: #2d3436;
        }

        .preview-body p {
            margin-bottom: 1.5rem;
        }

        .preview-body ul, .preview-body ol {
            margin-bottom: 1.5rem;
            padding-left: 2rem;
        }

        .preview-body li {
            margin-bottom: 0.5rem;
        }

        .preview-body code {
            background: #f8f9fa;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        .preview-body pre {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 20px 0;
        }

        .preview-body pre code {
            background: none;
            padding: 0;
        }

        .preview-body blockquote {
            border-left: 4px solid #667eea;
            padding-left: 20px;
            margin: 20px 0;
            font-style: italic;
            color: #636e72;
        }

        .preview-body img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 20px 0;
        }

        .preview-body table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }

        .preview-body table th,
        .preview-body table td {
            padding: 12px;
            border: 1px solid #e0e0e0;
            text-align: left;
        }

        .preview-body table th {
            background: #f8f9fa;
            font-weight: 600;
        }

        .action-buttons {
            padding: 20px 30px;
            background: #f8f9fa;
            border-top: 2px solid #e0e0e0;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-secondary:hover {
            background: #667eea;
            color: white;
        }

        .btn-success {
            background: #2ecc71;
            color: white;
        }

        .btn-success:hover {
            background: #27ae60;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(46, 204, 113, 0.3);
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: none;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .notification.success {
            border-left: 4px solid #2ecc71;
        }

        .notification.error {
            border-left: 4px solid #e74c3c;
        }

        .panel-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: #2d3436;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        @media (max-width: 1024px) {
            .editor-container {
                grid-template-columns: 1fr;
            }

            .editor-panel {
                border-right: none;
                border-bottom: 2px solid #e0e0e0;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }

        .help-text {
            font-size: 12px;
            color: #636e72;
            margin-top: 5px;
        }

        .char-count {
            text-align: right;
            font-size: 12px;
            color: #636e72;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 博客文章编辑器</h1>
            <p>所见即所得 · 实时预览 · 一键保存</p>
        </div>

        <div class="editor-container">
            <!-- 编辑面板 -->
            <div class="editor-panel">
                <div class="panel-title">
                    ✏️ 编辑区域
                </div>

                <form id="articleForm">
                    <div class="form-group">
                        <label for="title">文章标题 *</label>
                        <input type="text" id="title" placeholder="输入文章标题" required>
                        <div class="char-count" id="titleCount">0 / 100</div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="date">发布日期 *</label>
                            <input type="date" id="date" required>
                        </div>

                        <div class="form-group">
                            <label for="category">分类 *</label>
                            <select id="category" required>
                                <option value="">选择分类</option>
                                <option value="running">🏃 奔跑日记</option>
                                <option value="speech">🎤 演讲文稿</option>
                                <option value="reading">📚 读书笔记</option>
                                <option value="tech">💻 技术分享</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="tags">标签</label>
                        <input type="text" id="tags" placeholder="用逗号分隔，例如：技术,教程,博客">
                        <div class="help-text">多个标签用逗号分隔</div>
                    </div>

                    <div class="form-group">
                        <label for="description">文章简介</label>
                        <textarea id="description" rows="3" placeholder="简短描述文章内容（用于SEO和摘要）"></textarea>
                        <div class="char-count" id="descCount">0 / 200</div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="cover">封面图片</label>
                            <input type="text" id="cover" placeholder="/images/cover.jpg">
                        </div>

                        <div class="form-group">
                            <label for="views">阅读量</label>
                            <input type="number" id="views" value="0" min="0">
                        </div>
                    </div>

                    <div class="form-group markdown-editor">
                        <label for="content">文章内容 *</label>
                        <textarea id="content"></textarea>
                    </div>
                </form>
            </div>

            <!-- 预览面板 -->
            <div class="preview-panel">
                <div class="panel-title">
                    👁️ 实时预览
                </div>
                <div class="preview-content">
                    <div class="preview-header">
                        <span class="preview-category" id="previewCategory">选择分类</span>
                        <h1 class="preview-title" id="previewTitle">文章标题</h1>
                        <div class="preview-meta">
                            <span id="previewDate">📅 选择日期</span>
                            <span id="previewViews">👁 0 阅读</span>
                            <span id="previewReadTime">⏱ 1 分钟</span>
                        </div>
                    </div>
                    <div class="preview-body" id="previewBody">
                        <p style="color: #999; text-align: center; padding: 50px 0;">
                            开始编写内容，这里会实时显示预览...
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <div class="action-buttons">
            <button type="button" class="btn btn-secondary" onclick="clearForm()">
                🗑️ 清空
            </button>
            <button type="button" class="btn btn-primary" onclick="previewArticle()">
                👁️ 预览
            </button>
            <button type="button" class="btn btn-success" onclick="saveArticle()">
                💾 保存为 Markdown
            </button>
        </div>
    </div>

    <div class="notification" id="notification">
        <span id="notificationText"></span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
    <script>
        // 初始化 Markdown 编辑器
        const easyMDE = new EasyMDE({
            element: document.getElementById('content'),
            placeholder: '在这里编写文章内容...\n\n支持 Markdown 语法：\n- 标题：# H1, ## H2\n- 粗体：**文字**\n- 斜体：*文字*\n- 链接：[文字](URL)\n- 图片：![描述](图片路径)\n- 代码：```语言\n代码\n```',
            spellChecker: false,
            autosave: {
                enabled: true,
                uniqueId: 'blog-editor',
                delay: 1000,
            },
            toolbar: [
                'bold', 'italic', 'heading', '|',
                'quote', 'unordered-list', 'ordered-list', '|',
                'link', 'image', 'table', '|',
                'preview', 'side-by-side', 'fullscreen', '|',
                'guide'
            ],
            status: ['lines', 'words', 'cursor'],
        });

        // 设置默认日期为今天
        document.getElementById('date').valueAsDate = new Date();

        // 分类图标映射
        const categoryIcons = {
            'running': '🏃 奔跑日记',
            'speech': '🎤 演讲文稿',
            'reading': '📚 读书笔记',
            'tech': '💻 技术分享'
        };

        // 实时更新预览
        function updatePreview() {
            const title = document.getElementById('title').value || '文章标题';
            const date = document.getElementById('date').value || '选择日期';
            const category = document.getElementById('category').value;
            const views = document.getElementById('views').value || '0';
            const content = easyMDE.value();

            // 更新标题
            document.getElementById('previewTitle').textContent = title;

            // 更新分类
            document.getElementById('previewCategory').textContent = 
                category ? categoryIcons[category] : '选择分类';

            // 更新元数据
            document.getElementById('previewDate').textContent = `📅 ${date}`;
            document.getElementById('previewViews').textContent = `👁 ${views} 阅读`;

            // 计算阅读时间
            const readTime = Math.max(1, Math.ceil(content.length / 400));
            document.getElementById('previewReadTime').textContent = `⏱ ${readTime} 分钟`;

            // 更新内容
            if (content) {
                document.getElementById('previewBody').innerHTML = marked.parse(content);
            } else {
                document.getElementById('previewBody').innerHTML = 
                    '<p style="color: #999; text-align: center; padding: 50px 0;">开始编写内容，这里会实时显示预览...</p>';
            }
        }

        // 字符计数
        function updateCharCount() {
            const title = document.getElementById('title').value;
            const description = document.getElementById('description').value;
            
            document.getElementById('titleCount').textContent = `${title.length} / 100`;
            document.getElementById('descCount').textContent = `${description.length} / 200`;
        }

        // 监听输入变化
        document.getElementById('title').addEventListener('input', () => {
            updatePreview();
            updateCharCount();
        });
        document.getElementById('date').addEventListener('change', updatePreview);
        document.getElementById('category').addEventListener('change', updatePreview);
        document.getElementById('views').addEventListener('input', updatePreview);
        document.getElementById('description').addEventListener('input', updateCharCount);
        easyMDE.codemirror.on('change', updatePreview);

        // 保存文章
        function saveArticle() {
            const title = document.getElementById('title').value;
            const date = document.getElementById('date').value;
            const category = document.getElementById('category').value;
            const tags = document.getElementById('tags').value;
            const description = document.getElementById('description').value;
            const cover = document.getElementById('cover').value;
            const views = document.getElementById('views').value;
            const content = easyMDE.value();

            if (!title || !date || !category || !content) {
                showNotification('请填写必填项（标题、日期、分类、内容）', 'error');
                return;
            }

            // 生成 Front Matter
            const frontMatter = `---
title: ${title}
date: ${date}
category: ${category}
tags: ${tags}
description: ${description}
cover: ${cover}
views: ${views}
---

${content}`;

            // 生成文件名
            const filename = title
                .toLowerCase()
                .replace(/[^\w\s-]/g, '')
                .replace(/\s+/g, '-')
                .substring(0, 50);

            // 下载文件
            const blob = new Blob([frontMatter], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${filename}.md`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            showNotification('文章已保存！请将文件放到 blog-generator/content/ 目录', 'success');
        }

        // 清空表单
        function clearForm() {
            if (confirm('确定要清空所有内容吗？')) {
                document.getElementById('articleForm').reset();
                easyMDE.value('');
                document.getElementById('date').valueAsDate = new Date();
                updatePreview();
                updateCharCount();
                showNotification('表单已清空', 'success');
            }
        }

        // 预览文章
        function previewArticle() {
            document.querySelector('.preview-panel').scrollIntoView({ 
                behavior: 'smooth' 
            });
        }

        // 显示通知
        function showNotification(text, type = 'success') {
            const notification = document.getElementById('notification');
            const notificationText = document.getElementById('notificationText');
            
            notificationText.textContent = text;
            notification.className = `notification ${type}`;
            notification.style.display = 'flex';

            setTimeout(() => {
                notification.style.display = 'none';
            }, 3000);
        }

        // 初始化
        updatePreview();
        updateCharCount();

        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            // Ctrl/Cmd + S 保存
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                saveArticle();
            }
        });

        console.log('📝 博客编辑器已就绪！');
        console.log('💡 提示：使用 Ctrl/Cmd + S 快速保存');
    </script>
</body>
</html>
